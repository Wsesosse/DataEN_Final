x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: 'pandas requests scikit-learn'
    # Connection string for ML data database (use in DAGs via Variable or Connection)
    DATA_DB_HOST: postgres-data
    DATA_DB_PORT: '5432'
    DATA_DB_USER: datauser
    DATA_DB_PASSWORD: datapass
    DATA_DB_NAME: mldata
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-data:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────
  # PostgreSQL for Airflow Metadata
  # ─────────────────────────────────────────────
  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─────────────────────────────────────────────
  # PostgreSQL for ML / Data Processing
  # ─────────────────────────────────────────────
  postgres-data:
    image: postgres:16
    container_name: postgres-data
    environment:
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: datapass
      POSTGRES_DB: mldata
    ports:
      - "5433:5432"
    volumes:
      - postgres-ml-data:/var/lib/postgresql/data
      - ./scripts/init-data-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datauser -d mldata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─────────────────────────────────────────────
  # Airflow Init (run once to set up DB)
  # ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        # Create Airflow connection for ML data database
        airflow connections add 'postgres_data' \
          --conn-type 'postgres' \
          --conn-host 'postgres-data' \
          --conn-port '5432' \
          --conn-login 'datauser' \
          --conn-password 'datapass' \
          --conn-schema 'mldata' || true
    restart: "no"

  # ─────────────────────────────────────────────
  # Airflow Webserver
  # ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # Airflow Scheduler
  # ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-airflow-data:
  postgres-ml-data:
